<head>

<body>

    <div class="modal-overlay"></div>

<div class="modal-container">
    <div class="form-card">
        <button class="btn-close-modal" aria-label="Cerrar">×</button>

        <h2 class="form-title">EMPEZA AHORA</h2>
        <div class="title-line"></div>

        <form>

            <div class="mb-custom">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre" placeholder="Ej. Nicolas">
            </div>

            <div class="mb-custom">
                <label for="correo" class="form-label">Correo</label>
                <input type="email" class="form-control" id="correo" placeholder="Ej.123@gmail.com">
            </div>

            <div class="mb-custom">
                <label for="mensaje" class="form-label">Escribenos aquí</label>
                <textarea class="form-control" id="mensaje" placeholder="Tu mensaje..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar</button>
        </form>
    </div>
</div>

</body>
